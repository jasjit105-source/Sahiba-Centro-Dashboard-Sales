<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Sahiba Centro Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',-apple-system,sans-serif;background:linear-gradient(135deg,#f0f4ff 0%,#fdf2f8 30%,#eff6ff 60%,#f0fdf4 100%);color:#1a1d2e;min-height:100vh;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#c7d2fe;border-radius:3px}
input[type="date"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fu{animation:fadeUp .4s ease forwards}.fu1{animation-delay:.07s;opacity:0}.fu2{animation-delay:.14s;opacity:0}.fu3{animation-delay:.21s;opacity:0}.fu4{animation-delay:.28s;opacity:0}.fu5{animation-delay:.35s;opacity:0}
table{width:100%;border-collapse:collapse}
.hr:hover{background:linear-gradient(90deg,#eef2ff,#fdf4ff)!important;transition:background .2s}
.chip{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.spinner{width:24px;height:24px;border:3px solid #e0e7ff;border-top-color:#6366f1;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
.err-box{background:linear-gradient(135deg,#fef2f2,#fff1f2);border:1px solid #fecaca;color:#dc2626;padding:14px 18px;border-radius:12px;font-size:13px;margin:8px 0}
.kpi-card{position:relative;border-radius:18px;padding:20px 24px;display:flex;flex-direction:column;gap:8px;overflow:hidden;transition:transform .2s,box-shadow .2s;cursor:default}
.kpi-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.panel{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.6);border-radius:18px;padding:24px;box-shadow:0 4px 20px rgba(0,0,0,.03);transition:box-shadow .2s}
.panel:hover{box-shadow:0 8px 30px rgba(0,0,0,.06)}
</style>
</head>
<body>
<div id="root"><div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#6366f1;font-size:14px;gap:12px"><div class="spinner"></div>Cargando Sahiba Centro Dashboard...</div></div>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/prop-types/15.8.1/prop-types.min.js"></script>

<script>window.PropTypes=window.PropTypes||React.PropTypes;</script>

<script type="text/babel">
const h=React.createElement,{useState,useMemo,useEffect,useCallback}=React;
const{AreaChart,Area,BarChart,Bar,XAxis,YAxis,CartesianGrid,Tooltip,ResponsiveContainer,PieChart,Pie,Cell}=Recharts;

/* CONFIG */
const API_URL="/api/query";
const API_TOKEN="";

async function runQuery(query, params={}){
  const headers={"Content-Type":"application/json","ngrok-skip-browser-warning":"true"};
  if(API_TOKEN)headers["Authorization"]="Bearer "+API_TOKEN;
  const res=await fetch(API_URL,{method:"POST",headers,body:JSON.stringify({query,parameters:params})});
  if(!res.ok){var et="";try{var ej=await res.json();et=ej.message||ej.error||""}catch(x){try{et=await res.text()}catch(y){}}throw new Error("HTTP "+res.status+(et?" — "+et:""));}
  const j=await res.json();
  if(j.status!=="success")throw new Error(j.message||"Query failed");
  return j.data||[];
}
function fmtD(d){return d.replace(/-/g,"");}

/* SQL — Jazmin separated: Circunvalacion excludes YAZMIN, Jazmin is own row */
const SQL={
storeSummary:()=>"SELECT 'Circunvalacion' AS Store_Name,COUNT(DISTINCT M.NO_REFEREN) AS Ticket_Count,ISNULL(ROUND(SUM(M.Cantidad*M.Precio_Venta),0),0) AS Total_Sales,ISNULL(ROUND(SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad),0),0) AS Total_Profit,CASE WHEN COUNT(DISTINCT M.NO_REFEREN)>0 THEN ROUND(SUM(M.Cantidad*M.Precio_Venta)*1.0/COUNT(DISTINCT M.NO_REFEREN),0) ELSE 0 END AS Avg_Ticket_Value FROM MOVS_CIRCUNVALACION M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' AND NOT EXISTS(SELECT 1 FROM MOVS_CIRCUNVALACION Y WHERE Y.NO_REFEREN=M.NO_REFEREN AND Y.FECHA='{{fecha}}' AND Y.Movimiento='TK' AND Y.Vendedor='YAZMIN') UNION ALL SELECT 'Jazmin',COUNT(DISTINCT M.NO_REFEREN),ISNULL(ROUND(SUM(M.Cantidad*M.Precio_Venta),0),0),ISNULL(ROUND(SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad),0),0),CASE WHEN COUNT(DISTINCT M.NO_REFEREN)>0 THEN ROUND(SUM(M.Cantidad*M.Precio_Venta)*1.0/COUNT(DISTINCT M.NO_REFEREN),0) ELSE 0 END FROM MOVS_CIRCUNVALACION M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' AND EXISTS(SELECT 1 FROM MOVS_CIRCUNVALACION Y WHERE Y.NO_REFEREN=M.NO_REFEREN AND Y.FECHA='{{fecha}}' AND Y.Movimiento='TK' AND Y.Vendedor='YAZMIN') UNION ALL SELECT 'Leona Vicario',COUNT(DISTINCT M.NO_REFEREN),ISNULL(ROUND(SUM(M.Cantidad*M.Precio_Venta),0),0),ISNULL(ROUND(SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad),0),0),CASE WHEN COUNT(DISTINCT M.NO_REFEREN)>0 THEN ROUND(SUM(M.Cantidad*M.Precio_Venta)*1.0/COUNT(DISTINCT M.NO_REFEREN),0) ELSE 0 END FROM MOVS_LEONA M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' UNION ALL SELECT 'Lucumberri',COUNT(DISTINCT M.NO_REFEREN),ISNULL(ROUND(SUM(M.Cantidad*M.Precio_Venta),0),0),ISNULL(ROUND(SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad),0),0),CASE WHEN COUNT(DISTINCT M.NO_REFEREN)>0 THEN ROUND(SUM(M.Cantidad*M.Precio_Venta)*1.0/COUNT(DISTINCT M.NO_REFEREN),0) ELSE 0 END FROM MOVS_LECUMBERRI M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' UNION ALL SELECT 'Chinconcuac',COUNT(DISTINCT M.NO_REFEREN),ISNULL(ROUND(SUM(M.Cantidad*M.Precio_Venta),0),0),ISNULL(ROUND(SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad),0),0),CASE WHEN COUNT(DISTINCT M.NO_REFEREN)>0 THEN ROUND(SUM(M.Cantidad*M.Precio_Venta)*1.0/COUNT(DISTINCT M.NO_REFEREN),0) ELSE 0 END FROM MOVS_CHINCONCUAC M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK'",

tickets:(f,store)=>{const tbl={Circunvalacion:"MOVS_CIRCUNVALACION","Leona Vicario":"MOVS_LEONA",Lucumberri:"MOVS_LECUMBERRI",Chinconcuac:"MOVS_CHINCONCUAC",Yazmin:"MOVS_CIRCUNVALACION"};const t=tbl[store]||"MOVS_CIRCUNVALACION";const yf=store==="Jazmin"?" AND EXISTS(SELECT 1 FROM MOVS_CIRCUNVALACION Y WHERE Y.NO_REFEREN=M.NO_REFEREN AND Y.FECHA='{{fecha}}' AND Y.Movimiento='TK' AND Y.Vendedor='YAZMIN')":(store==="Circunvalacion"?" AND NOT EXISTS(SELECT 1 FROM MOVS_CIRCUNVALACION Y WHERE Y.NO_REFEREN=M.NO_REFEREN AND Y.FECHA='{{fecha}}' AND Y.Movimiento='TK' AND Y.Vendedor='YAZMIN')":"");return "SELECT '"+store+"' AS Store,M.NO_REFEREN AS Ticket,CAST(ROUND(SUM(M.Cantidad*M.Precio_Venta),0)AS INT) AS Total_Amount,CAST(ROUND(SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad),0)AS INT) AS Ticket_Profit,CAST(CASE WHEN SUM(M.Cantidad*M.Precio_Venta)=0 THEN 0 ELSE ROUND(100.0*SUM((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad)/SUM(M.Cantidad*M.Precio_Venta),2)END AS DECIMAL(10,2)) AS Profit_Percentage,COUNT(*) AS Item_Count,MAX(M.Tarjetas) AS Tarjetas FROM "+t+" M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK'"+yf+" GROUP BY M.NO_REFEREN ORDER BY M.NO_REFEREN";},

ticketDetail:(f,ticket,store)=>{const tbl={Circunvalacion:"MOVS_CIRCUNVALACION","Leona Vicario":"MOVS_LEONA",Lucumberri:"MOVS_LECUMBERRI",Chinconcuac:"MOVS_CHINCONCUAC",Yazmin:"MOVS_CIRCUNVALACION"};const t=tbl[store]||"MOVS_CIRCUNVALACION";const yf="";return "SELECT '"+store+"' AS Store,M.NO_REFEREN AS Ticket,M.Articulo AS Item_Code,M.Descripcion AS Description,M.Cantidad AS Quantity,M.Precio_Venta AS Unit_Price,ROUND(M.Cantidad*M.Precio_Venta,0) AS Line_Total,ISNULL(C.Costo,0) AS Cost,ROUND((M.Precio_Venta-ISNULL(C.Costo,0))*M.Cantidad,0) AS Line_Profit,CAST(CASE WHEN M.Precio_Venta=0 THEN 0 ELSE ROUND(100.0*(M.Precio_Venta-ISNULL(C.Costo,0))/M.Precio_Venta,2)END AS DECIMAL(10,2)) AS Profit_Percentage FROM "+t+" M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.NO_REFEREN='"+ticket+"'"+yf+" ORDER BY M.Articulo";},

topItems:()=>"SELECT TOP 20 CI.Articulo AS Item_Code,MAX(CI.Descripcion) AS Description,SUM(CI.Cantidad) AS Total_Quantity,SUM(CI.Cantidad*CI.Precio_Venta) AS Total_Sales,SUM((CI.Precio_Venta-ISNULL(CI.Costo,0))*CI.Cantidad) AS Total_Profit,CAST(CASE WHEN SUM(CI.Cantidad*CI.Precio_Venta)=0 THEN 0 ELSE ROUND(100.0*SUM((CI.Precio_Venta-ISNULL(CI.Costo,0))*CI.Cantidad)/SUM(CI.Cantidad*CI.Precio_Venta),2)END AS DECIMAL(10,2)) AS Profit_Percentage,COUNT(DISTINCT CI.StoreSource) AS Store_Count FROM(SELECT M.Articulo,M.Descripcion,M.Cantidad,M.Precio_Venta,'CERCU' AS StoreSource,C.Costo FROM MOVS_CIRCUNVALACION M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' UNION ALL SELECT M.Articulo,M.Descripcion,M.Cantidad,M.Precio_Venta,'LEONA',C.Costo FROM MOVS_LEONA M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' UNION ALL SELECT M.Articulo,M.Descripcion,M.Cantidad,M.Precio_Venta,'LUCUM',C.Costo FROM MOVS_LECUMBERRI M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK' UNION ALL SELECT M.Articulo,M.Descripcion,M.Cantidad,M.Precio_Venta,'CHINCO',C.Costo FROM MOVS_CHINCONCUAC M LEFT JOIN SAP_CC C ON C.Articulo=M.Articulo WHERE M.FECHA='{{fecha}}' AND M.Movimiento='TK')AS CI GROUP BY CI.Articulo ORDER BY Total_Sales DESC",

deposits:()=>"SELECT 'Circunvalacion' AS Branch,NO_REFEREN AS Ticket,ROUND(SUM(Cantidad*Precio_Venta),0) AS Total,PrEnvio AS Bank_Deposit,MAX(Tarjetas) AS Cards,MAX(Fecha) AS Date,UPPER(MAX(Vendedor)) AS Seller,UPPER(MAX(CustCliente)) AS Customer,UPPER(MAX(PAGO2)) AS Account,MAX(CustPhone) AS Phone FROM MOVS_CIRCUNVALACION WHERE PAGO2<>'' AND CONVERT(DATE,Fecha)='{{fecha}}' GROUP BY NO_REFEREN,PrEnvio UNION ALL SELECT 'Leona Vicario',NO_REFEREN,ROUND(SUM(Cantidad*Precio_Venta),0),PrEnvio,MAX(Tarjetas),MAX(Fecha),UPPER(MAX(Vendedor)),UPPER(MAX(CustCliente)),UPPER(MAX(PAGO2)),MAX(CustPhone) FROM MOVS_LEONA WHERE PAGO2<>'' AND CONVERT(DATE,Fecha)='{{fecha}}' GROUP BY NO_REFEREN,PrEnvio",

inventory:()=>"SELECT I.Articulo,ISNULL(ROUND(MAX(C.Costo),0),0) AS Costo,SUM(CASE WHEN I.Store='Circunvalacion' THEN I.EXISTENCIA ELSE 0 END) AS Cercu,SUM(CASE WHEN I.Store='Leona' THEN I.EXISTENCIA ELSE 0 END) AS Leona,SUM(CASE WHEN I.Store='Lecumberri' THEN I.EXISTENCIA ELSE 0 END) AS Lucum,SUM(CASE WHEN I.Store='Chinconcuac' THEN I.EXISTENCIA ELSE 0 END) AS Chinco,SUM(CASE WHEN I.Store='Bodega' THEN I.EXISTENCIA ELSE 0 END) AS Bodega,SUM(I.EXISTENCIA) AS Total FROM(SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1) AS Articulo,EXISTENCIA,'Circunvalacion' AS Store FROM PRODS_C UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),EXISTENCIA,'Leona' FROM PRODS_L UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),EXISTENCIA,'Chinconcuac' FROM PRODS_CHIN UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),EXISTENCIA,'Lecumberri' FROM PRODS_LECU UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),EXISTENCIA,'Bodega' FROM SAP_CC)AS I LEFT JOIN(SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1) AS Articulo,ROUND(Costo,0) AS Costo FROM SAP_CC)AS C ON I.Articulo=C.Articulo GROUP BY I.Articulo HAVING SUM(I.EXISTENCIA)>0 ORDER BY SUM(I.EXISTENCIA) DESC",

yazminTickets:()=>"SELECT CONVERT(DATE,FECHA) AS Fecha,NO_REFEREN AS Ticket,SUM(Cantidad*Precio_Venta) AS Total_Amount,ROUND(SUM(Cantidad*Precio_Venta)*0.02,0) AS Commission,COUNT(*) AS Item_Count,MIN(CustPhone) AS Phone,MIN(CustCliente) AS Customer,MIN(CustGuia) AS Guia,MIN(PAGO2) AS Pago2,MIN(PrEnvio) AS Envio FROM MOVS_CIRCUNVALACION WHERE FECHA BETWEEN '{{fecha_inicio}}' AND '{{fecha_fin}}' AND Movimiento='TK' AND Vendedor='YAZMIN' GROUP BY CONVERT(DATE,FECHA),NO_REFEREN ORDER BY CONVERT(DATE,FECHA),NO_REFEREN",

yazminDaily:()=>"SELECT CONVERT(DATE,FECHA) AS Fecha,ROUND(SUM(Cantidad*Precio_Venta),0) AS TotalSale,COUNT(DISTINCT NO_REFEREN) AS Tickets FROM MOVS_CIRCUNVALACION WHERE FECHA BETWEEN '{{fecha_inicio}}' AND '{{fecha_fin}}' AND Movimiento='TK' AND Vendedor='YAZMIN' GROUP BY CONVERT(DATE,FECHA) ORDER BY CONVERT(DATE,FECHA)",

yazminTopCustomers:()=>"SELECT TOP 50 ISNULL(MAX(CustCliente),'') AS Customer,CustPhone AS Phone,SUM(ROUND(Cantidad*Precio_Venta,0)) AS Total_Amount,COUNT(DISTINCT NO_REFEREN) AS Visits FROM MOVS_CIRCUNVALACION WHERE FECHA BETWEEN '{{fecha_inicio}}' AND '{{fecha_fin}}' AND Movimiento='TK' AND Vendedor='YAZMIN' AND CustPhone IS NOT NULL GROUP BY CustPhone ORDER BY Total_Amount DESC",

yazminBigTickets:()=>"SELECT CONVERT(DATE,FECHA) AS Fecha,NO_REFEREN AS Ticket,MIN(CustCliente) AS Customer,MIN(CustPhone) AS Phone,SUM(Cantidad*Precio_Venta) AS Total_Amount,COUNT(*) AS Items FROM MOVS_CIRCUNVALACION WHERE FECHA BETWEEN '{{fecha_inicio}}' AND '{{fecha_fin}}' AND Movimiento='TK' AND Vendedor='YAZMIN' GROUP BY CONVERT(DATE,FECHA),NO_REFEREN HAVING SUM(Cantidad*Precio_Venta)>=10000 ORDER BY Total_Amount DESC",

regularSales:()=>"SELECT C.Articulo,SUM(CASE WHEN C.Store='Circunvalacion' THEN C.Cantidad ELSE 0 END) AS Cercu_Sales,SUM(CASE WHEN C.Store='Circunvalacion - Yazmin' THEN C.Cantidad ELSE 0 END) AS Jazmin_Sales,SUM(CASE WHEN C.Store='Leona' THEN C.Cantidad ELSE 0 END) AS Leona_Sales,SUM(CASE WHEN C.Store='Lecumberri' THEN C.Cantidad ELSE 0 END) AS Lecum_Sales,SUM(CASE WHEN C.Store='Chinconcuac' THEN C.Cantidad ELSE 0 END) AS Chinco_Sales,SUM(C.Cantidad) AS Total_Sales,ROUND(SUM(C.Cantidad*C.Precio_Venta),0) AS Total_Revenue,ROUND(CASE WHEN SUM(C.Cantidad)>0 THEN SUM(C.Cantidad*C.Precio_Venta)/SUM(C.Cantidad) ELSE 0 END,0) AS Avg_Price,ISNULL(ROUND(MAX(D.Costo),0),0) AS Cost,ROUND(ROUND(CASE WHEN SUM(C.Cantidad)>0 THEN SUM(C.Cantidad*C.Precio_Venta)/SUM(C.Cantidad) ELSE 0 END,0)-ISNULL(ROUND(MAX(D.Costo),0),0),0) AS Profit_Per_Pz,ROUND((ROUND(CASE WHEN SUM(C.Cantidad)>0 THEN SUM(C.Cantidad*C.Precio_Venta)/SUM(C.Cantidad) ELSE 0 END,0)-ISNULL(ROUND(MAX(D.Costo),0),0))*SUM(C.Cantidad),0) AS Net_Profit,ISNULL(MAX(I.Cercu_Stock),0) AS Cercu_Stock,ISNULL(MAX(I.Leona_Stock),0) AS Leona_Stock,ISNULL(MAX(I.Chinco_Stock),0) AS Chinco_Stock,ISNULL(MAX(I.Lecum_Stock),0) AS Lecum_Stock,ISNULL(MAX(I.Bodega_Stock),0) AS Bodega_Stock,ISNULL(MAX(I.Total_Stock),0) AS Total_Stock FROM(SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1) AS Articulo,Cantidad,Precio_Venta,'Circunvalacion' AS Store FROM MOVS_CIRCUNVALACION WHERE FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Movimiento='TK' AND NOT EXISTS(SELECT 1 FROM MOVS_CIRCUNVALACION Y WHERE Y.NO_REFEREN=MOVS_CIRCUNVALACION.NO_REFEREN AND Y.FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Y.Movimiento='TK' AND Y.Vendedor='YAZMIN') UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),Cantidad,Precio_Venta,'Circunvalacion - Yazmin' FROM MOVS_CIRCUNVALACION WHERE FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Movimiento='TK' AND EXISTS(SELECT 1 FROM MOVS_CIRCUNVALACION Y WHERE Y.NO_REFEREN=MOVS_CIRCUNVALACION.NO_REFEREN AND Y.FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Y.Movimiento='TK' AND Y.Vendedor='YAZMIN') UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),Cantidad,Precio_Venta,'Leona' FROM MOVS_LEONA WHERE FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Movimiento='TK' UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),Cantidad,Precio_Venta,'Lecumberri' FROM MOVS_LECUMBERRI WHERE FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Movimiento='TK' UNION ALL SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1),Cantidad,Precio_Venta,'Chinconcuac' FROM MOVS_CHINCONCUAC WHERE FECHA BETWEEN '{{fecha1}}' AND '{{fecha2}}' AND Movimiento='TK')AS C LEFT JOIN(SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1) AS Articulo,SUM(CASE WHEN Store='Circunvalacion' THEN EXISTENCIA ELSE 0 END) AS Cercu_Stock,SUM(CASE WHEN Store='Leona' THEN EXISTENCIA ELSE 0 END) AS Leona_Stock,SUM(CASE WHEN Store='Chinconcuac' THEN EXISTENCIA ELSE 0 END) AS Chinco_Stock,SUM(CASE WHEN Store='Lecumberri' THEN EXISTENCIA ELSE 0 END) AS Lecum_Stock,SUM(CASE WHEN Store='Bodega' THEN EXISTENCIA ELSE 0 END) AS Bodega_Stock,SUM(EXISTENCIA) AS Total_Stock FROM(SELECT Articulo,EXISTENCIA,'Circunvalacion' AS Store FROM PRODS_C UNION ALL SELECT Articulo,EXISTENCIA,'Leona' FROM PRODS_L UNION ALL SELECT Articulo,EXISTENCIA,'Chinconcuac' FROM PRODS_CHIN UNION ALL SELECT Articulo,EXISTENCIA,'Lecumberri' FROM PRODS_LECU UNION ALL SELECT Articulo,EXISTENCIA,'Bodega' FROM SAP_CC)X GROUP BY LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1))AS I ON C.Articulo=I.Articulo LEFT JOIN(SELECT LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1) AS Articulo,ROUND(Costo,0) AS Costo FROM SAP_CC)AS D ON C.Articulo=D.Articulo WHERE C.Articulo NOT IN('2064VE','2065VE','2066VE','2068VE','2071VE','2074VE','2077VE','2078VE','2085VE','4000BA') GROUP BY C.Articulo ORDER BY Total_Sales DESC",

kardex:(art)=>"SELECT Ubicacion,CONVERT(VARCHAR(10),Fecha,103) AS Fecha,ISNULL(Referencia,'') AS Referencia,TipoMov,Descripcion,Entrada,Salida FROM(SELECT 'BODEGA' AS Ubicacion,Fecha,CAST(NULL AS VARCHAR(50)) AS Referencia,'ENTRADA' AS TipoMov,Articulo AS Descripcion,Cantidad AS Entrada,0 AS Salida FROM PAR_INVENT WHERE Articulo LIKE '"+art+"%' AND Fecha BETWEEN '{{fecha1}}' AND '{{fecha2}}' UNION ALL SELECT 'BODEGA',Fecha,CAST(N_Documento AS VARCHAR(50)),'SALIDA '+CASE Cliente WHEN 'TS0001' THEN 'LEONA' WHEN 'TS0002' THEN 'CERCU' WHEN 'TS0003' THEN 'LECUM' WHEN 'TS0004' THEN 'CHINCO' WHEN 'TS0005' THEN 'DOSMASTRES' WHEN 'TS0006' THEN 'INTERNO' ELSE Cliente END,Articulo,0,Cantidad FROM PAR_INVSAL WHERE Articulo LIKE '"+art+"%' AND Fecha BETWEEN '{{fecha1}}' AND '{{fecha2}}' UNION ALL SELECT 'CIRCUNVALACION',Fecha,CAST(NO_REFEREN AS VARCHAR(50)),'VENTA',Articulo,0,Cantidad FROM MOVS_CIRCUNVALACION WHERE LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1)='"+art+"' AND Movimiento='TK' AND Fecha BETWEEN '{{fecha1}}' AND '{{fecha2}}' UNION ALL SELECT 'LEONA VICARIO',Fecha,CAST(NO_REFEREN AS VARCHAR(50)),'VENTA',Articulo,0,Cantidad FROM MOVS_LEONA WHERE LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1)='"+art+"' AND Movimiento='TK' AND Fecha BETWEEN '{{fecha1}}' AND '{{fecha2}}' UNION ALL SELECT 'LECUMBERRI',Fecha,CAST(NO_REFEREN AS VARCHAR(50)),'VENTA',Articulo,0,Cantidad FROM MOVS_LECUMBERRI WHERE LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1)='"+art+"' AND Movimiento='TK' AND Fecha BETWEEN '{{fecha1}}' AND '{{fecha2}}' UNION ALL SELECT 'CHINCONCUAC',Fecha,CAST(NO_REFEREN AS VARCHAR(50)),'VENTA',Articulo,0,Cantidad FROM MOVS_CHINCONCUAC WHERE LEFT(Articulo,CHARINDEX('-',Articulo+'-')-1)='"+art+"' AND Movimiento='TK' AND Fecha BETWEEN '{{fecha1}}' AND '{{fecha2}}')K ORDER BY Fecha,Ubicacion",

function useQuery(sql,params,deps){
  var st=useState(null),data=st[0],setData=st[1];
  var st2=useState(true),loading=st2[0],setLoading=st2[1];
  var st3=useState(null),error=st3[0],setError=st3[1];
  useEffect(function(){var cancel=false;setLoading(true);setError(null);
    runQuery(sql,params).then(function(d){if(!cancel){setData(d);setLoading(false)}}).catch(function(e){if(!cancel){setError(e.message);setLoading(false)}});
    return function(){cancel=true};
  },deps);
  return{data:data,loading:loading,error:error};
}
